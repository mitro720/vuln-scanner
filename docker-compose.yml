services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - SCANNER_API_URL=http://scanner-core:8000
    depends_on:
      - scanner-core

  scanner-core:
    build:
      context: ./scanner-core
    ports:
      - "8000:8000"
    volumes:
      - ./scanner-core:/app
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - BACKEND_URL=http://backend:5000
